name: Render JobFit Videos

on:
  workflow_dispatch:
    inputs:
      composition:
        description: "Which composition to render"
        required: true
        default: "JobFitCinematic"
        type: choice
        options:
          - JobFitCinematic
          - WalkthroughVideo
          - both
  push:
    paths:
      - "video/src/**"
      - "video/public/**"
      - "video/package.json"

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: video/package-lock.json

      - name: Install dependencies
        working-directory: video
        run: npm ci

      - name: Install Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser
          echo "CHROME_PATH=$(which chromium-browser)" >> $GITHUB_ENV

      - name: Create output directory
        working-directory: video
        run: mkdir -p out

      - name: Render JobFitCinematic (v2 1080×1080)
        if: ${{ github.event_name == 'push' || inputs.composition == 'JobFitCinematic' || inputs.composition == 'both' }}
        working-directory: video
        run: |
          npx remotion render \
            JobFitCinematic \
            out/jobfit-cinematic.mp4 \
            --codec=h264 \
            --browser-executable="$CHROME_PATH" \
            --concurrency=4 \
            --gl=swiftshader
        env:
          DISPLAY: ":99"

      - name: Render WalkthroughVideo (v1 1280×720)
        if: ${{ inputs.composition == 'WalkthroughVideo' || inputs.composition == 'both' }}
        working-directory: video
        run: |
          npx remotion render \
            WalkthroughVideo \
            out/jobfit-walkthrough.mp4 \
            --codec=h264 \
            --browser-executable="$CHROME_PATH" \
            --concurrency=4 \
            --gl=swiftshader
        env:
          DISPLAY: ":99"

      - name: Upload rendered videos
        uses: actions/upload-artifact@v4
        with:
          name: jobfit-videos
          path: video/out/*.mp4
          retention-days: 30
