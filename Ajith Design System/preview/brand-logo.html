<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { background: var(--neutral-50); padding: 28px; display: flex; align-items: center; justify-content: space-around; gap: 24px; min-height: 240px; }
  .lockup { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .mark { width: 88px; height: 88px; display: grid; place-items: center; }
  .mark.ink { background: var(--neutral-900); border-radius: 16px; padding: 10px; }
  .mark img { width: 100%; height: 100%; object-fit: contain; }
  .word { font-family: var(--font-sans); font-size: 22px; font-weight: 700; letter-spacing: -0.02em; color: var(--neutral-900); line-height: 1; }
  .word em { font-family: var(--font-edit); font-style: normal; font-weight: 400; color: var(--brand-red-500); font-size: 1.1em; padding-left: 0.12em; }
  .tag { font-family: var(--font-mono); font-size: 9px; color: var(--fg-subtle); text-transform: uppercase; letter-spacing: 0.12em; }
</style>
</head><body class="card-shell">
<div class="card-eyebrow" style="position:absolute;top:20px;left:28px"><span class="dot"></span>LOGO LOCKUPS</div>
<div class="lockup"><div class="mark"><img src="../assets/logo-mark-black.png" alt=""></div><div class="tag">mark · ink</div></div>
<div class="lockup"><div class="mark ink"><img src="../assets/logo-mark-white.png" alt=""></div><div class="tag">mark · reversed</div></div>
<div class="lockup">
  <div style="display:flex;align-items:center;gap:14px">
    <div style="width:54px;height:54px"><img src="../assets/logo-mark-black.png" style="width:100%;height:100%;object-fit:contain"></div>
    <div class="word">Ajith Adithya <em>R K</em></div>
  </div>
  <div class="tag">horizontal wordmark</div>
</div>
</body></html>
