<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { background: var(--neutral-50); padding: 24px 28px; }
  .row { display: flex; gap: 0; border-radius: var(--r-lg); overflow: hidden; height: 92px; box-shadow: var(--shadow-sm); border: 1px solid var(--border); }
  .swatch { flex: 1; display: flex; flex-direction: column; justify-content: flex-end; padding: 10px 12px; color: #fff; font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.06em; line-height: 1.3; }
  .swatch .name { font-weight: 600; font-size: 11px; }
  .swatch.dark-label { color: var(--neutral-900); }
</style>
</head><body class="card-shell">
<div class="card-eyebrow"><span class="dot"></span>BRAND · CRIMSON SCALE</div>
<div class="row">
  <div class="swatch dark-label" style="background:#FDECEC"><div class="name">red/50</div>#FDECEC</div>
  <div class="swatch dark-label" style="background:#F9D0D0"><div class="name">100</div>#F9D0D0</div>
  <div class="swatch dark-label" style="background:#F1A1A1"><div class="name">200</div>#F1A1A1</div>
  <div class="swatch" style="background:#E66B6B"><div class="name">300</div>#E66B6B</div>
  <div class="swatch" style="background:#D63838"><div class="name">400</div>#D63838</div>
  <div class="swatch" style="background:#C01414"><div class="name">500 · hero</div>#C01414</div>
  <div class="swatch" style="background:#9C0A0A"><div class="name">600</div>#9C0A0A</div>
  <div class="swatch" style="background:#7A0707"><div class="name">700</div>#7A0707</div>
  <div class="swatch" style="background:#530303"><div class="name">800</div>#530303</div>
  <div class="swatch" style="background:#1A0000"><div class="name">ink</div>#1A0000</div>
</div>
</body></html>
