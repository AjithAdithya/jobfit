<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { background: var(--neutral-50); padding: 22px 28px; display: flex; flex-direction: column; gap: 14px; }
  .row { display: flex; gap: 18px; align-items: baseline; padding-bottom: 14px; border-bottom: 1px dashed var(--border); }
  .row:last-child { border: 0; }
  .label { font-family: var(--font-mono); font-size: 10px; color: var(--fg-muted); letter-spacing: 0.1em; text-transform: uppercase; width: 90px; flex: 0 0 90px; }
  .big { font-family: var(--font-chunk); font-size: 56px; line-height: 0.95; color: var(--neutral-900); letter-spacing: -0.01em; }
  .med { font-family: var(--font-edit); font-size: 48px; line-height: 1; color: var(--brand-violet-500); }
  .note { font-family: var(--font-mono); font-size: 9px; color: var(--fg-subtle); letter-spacing: 0.1em; margin-top: 6px; display: block; text-transform: uppercase; }
</style>
</head><body class="card-shell">
<div class="card-eyebrow"><span class="dot"></span>BRAND FACES · CHUNER + SILKIGFINED</div>
<div class="row">
  <div class="label">Chuner</div>
  <div>
    <div class="big">AaBbGgJj 123</div>
    <span class="note">Chunk display · hero headlines · one weight</span>
  </div>
</div>
<div class="row">
  <div class="label">Silkigfined</div>
  <div>
    <div class="med">timeless &amp; quiet</div>
    <span class="note">Editorial serif · accents, pull quotes, italic-role words</span>
  </div>
</div>
</body></html>
