<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { background: var(--neutral-50); padding: 24px 28px; display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .card { background: #fff; border: 1px solid var(--border); border-radius: 14px; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
  .card .tag { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--brand-violet-500); }
  .card h3 { font-family: var(--font-sans); font-size: 18px; font-weight: 700; letter-spacing: -0.015em; margin: 0; }
  .card h3 em { font-family: var(--font-serif); font-style: italic; font-weight: 400; font-size: 1.1em; }
  .card p { font-size: 13px; color: var(--fg-muted); margin: 0; line-height: 1.45; }
  .meta { display: flex; gap: 10px; font-family: var(--font-mono); font-size: 10px; color: var(--fg-subtle); letter-spacing: 0.08em; }
  .card.editorial { border: 1px solid var(--neutral-900); border-radius: 0; background: var(--accent-cream); }
</style>
</head><body class="card-shell">
<div class="card-eyebrow" style="grid-column:1/-1"><span class="dot"></span>CARDS · UI VS EDITORIAL</div>
<div class="card">
  <span class="tag">№ 07</span>
  <h3>Glyph <em>studio</em></h3>
  <p>Browser-based variable font playground. WebGL, 2024.</p>
  <div class="meta"><span>TYPE</span><span>·</span><span>2024</span></div>
</div>
<div class="card editorial">
  <span class="tag">№ 12</span>
  <h3>Quiet machines</h3>
  <p>Essay on restraint in developer tooling. 2,400 words.</p>
  <div class="meta"><span>WRITING</span><span>·</span><span>JAN 2026</span></div>
</div>
</body></html>
