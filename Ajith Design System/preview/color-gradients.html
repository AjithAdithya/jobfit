<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { background: var(--neutral-50); padding: 22px 28px; }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .g { height: 160px; border-radius: var(--r-lg); position: relative; overflow: hidden; box-shadow: var(--shadow-sm); }
  .g span { position: absolute; left: 12px; bottom: 10px; font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: #fff; }
  .g.aurora span, .g.paper span { color: var(--neutral-900); }
  .g1 { background: linear-gradient(120deg, #5B2FE6 0%, #7B52FF 45%, #A07DFF 100%); }
  .g2 { background: linear-gradient(180deg, #1C0B6E 0%, #0A0322 100%); }
  .g3 { background: linear-gradient(135deg, #5B2FE6 0%, #FF4D2E 55%, #D7FF3A 100%); }
</style>
</head><body class="card-shell">
<div class="card-eyebrow"><span class="dot"></span>GRADIENTS · HERO USE ONLY</div>
<div class="grid">
  <div class="g g1"><span>ultraviolet</span></div>
  <div class="g g2"><span>ink</span></div>
  <div class="g g3 aurora"><span>aurora · sparingly</span></div>
</div>
</body></html>
