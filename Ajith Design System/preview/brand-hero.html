<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { background: linear-gradient(120deg, #5B2FE6 0%, #7B52FF 45%, #A07DFF 100%); padding: 30px 28px; display: flex; flex-direction: column; justify-content: center; min-height: 260px; }
  h1 { font-family: var(--font-sans); color: #fff; font-size: 56px; font-weight: 800; letter-spacing: -0.035em; line-height: 1.02; margin: 0; max-width: 560px; }
  h1 em { font-family: var(--font-serif); font-style: italic; font-weight: 400; color: var(--accent-citrus); font-size: 1.18em; }
  .eye { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(255,255,255,0.72); margin-bottom: 14px; }
  .sparkle { position: absolute; right: 32px; bottom: 24px; color: var(--accent-citrus); font-size: 26px; }
</style>
</head><body class="card-shell" style="position:relative">
<div class="eye">№ 01 · HERO · ULTRAVIOLET</div>
<h1>Designer, engineer, occasional <em>typographer</em>.</h1>
<span class="sparkle">✦</span>
</body></html>
