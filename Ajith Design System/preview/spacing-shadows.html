<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { background: var(--neutral-50); padding: 28px; display: grid; grid-template-columns: repeat(5, 1fr); gap: 18px; align-items: center; }
  .card { background: #fff; height: 80px; border-radius: 12px; display: flex; align-items: flex-end; justify-content: center; padding-bottom: 10px; font-family: var(--font-mono); font-size: 10px; color: var(--fg-muted); letter-spacing: 0.08em; }
  .s-xs { box-shadow: 0 1px 0 0 rgba(12,3,64,0.04); }
  .s-sm { box-shadow: 0 1px 2px rgba(12,3,64,0.06), 0 1px 0 rgba(12,3,64,0.03); }
  .s-md { box-shadow: 0 6px 18px -4px rgba(12,3,64,0.10), 0 2px 4px rgba(12,3,64,0.04); }
  .s-lg { box-shadow: 0 22px 48px -16px rgba(12,3,64,0.22), 0 8px 16px -8px rgba(12,3,64,0.08); }
  .s-glow { box-shadow: 0 0 0 1px rgba(91,47,230,0.20), 0 10px 40px -8px rgba(91,47,230,0.55); }
</style>
</head><body class="card-shell">
<div class="card-eyebrow" style="grid-column:1/-1"><span class="dot"></span>SHADOWS · VIOLET-INK TINTED</div>
<div class="card s-xs">xs</div>
<div class="card s-sm">sm</div>
<div class="card s-md">md</div>
<div class="card s-lg">lg</div>
<div class="card s-glow">glow</div>
</body></html>
