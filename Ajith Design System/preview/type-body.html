<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { background: var(--neutral-50); padding: 22px 28px; display: flex; flex-direction: column; gap: 0; }
  .step { display: flex; align-items: baseline; gap: 14px; border-bottom: 1px dashed var(--border); padding: 7px 0; }
  .step:last-child { border: 0; }
  .tok { font-family: var(--font-mono); font-size: 10px; color: var(--fg-muted); width: 70px; flex: 0 0 70px; text-transform: uppercase; letter-spacing: 0.1em; }
  .spec { font-family: var(--font-sans); color: var(--fg); flex: 1; line-height: 1.35; }
  .meta { font-family: var(--font-mono); font-size: 10px; color: var(--fg-subtle); flex: 0 0 auto; }
</style>
</head><body class="card-shell">
<div class="card-eyebrow"><span class="dot"></span>TYPE · BODY & UI SCALE</div>
<div class="step"><span class="tok">xl</span><span class="spec" style="font-size:22px">Lede paragraph — slightly larger</span><span class="meta">22</span></div>
<div class="step"><span class="tok">lg</span><span class="spec" style="font-size:18px">Large body · intro copy</span><span class="meta">18</span></div>
<div class="step"><span class="tok">md</span><span class="spec" style="font-size:16px">Standard body · UI default</span><span class="meta">16</span></div>
<div class="step"><span class="tok">base</span><span class="spec" style="font-size:15px">Reading body · long-form</span><span class="meta">15</span></div>
<div class="step"><span class="tok">sm</span><span class="spec" style="font-size:13px;color:var(--fg-muted)">Caption · secondary UI text</span><span class="meta">13</span></div>
<div class="step"><span class="tok">xs · mono</span><span class="spec" style="font-family:var(--font-mono);font-size:12px;text-transform:uppercase;letter-spacing:0.12em;color:var(--fg-subtle)">EYEBROW / METADATA</span><span class="meta">12</span></div>
</body></html>
