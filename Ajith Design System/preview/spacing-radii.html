<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { background: var(--neutral-50); padding: 22px 28px; display: flex; gap: 18px; align-items: flex-end; flex-wrap: wrap; }
  .u { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .box { width: 68px; height: 68px; background: var(--brand-violet-500); }
  .tag { font-family: var(--font-mono); font-size: 10px; color: var(--fg-muted); letter-spacing: 0.08em; }
</style>
</head><body class="card-shell">
<div class="card-eyebrow"><span class="dot"></span>RADII · CHROME VS EDITORIAL</div>
<div style="display:flex;gap:20px;flex-wrap:wrap;align-items:flex-end;">
  <div class="u"><div class="box" style="border-radius:0"></div><div class="tag">0 · editorial</div></div>
  <div class="u"><div class="box" style="border-radius:4px"></div><div class="tag">xs · 4</div></div>
  <div class="u"><div class="box" style="border-radius:6px"></div><div class="tag">sm · 6</div></div>
  <div class="u"><div class="box" style="border-radius:10px"></div><div class="tag">md · 10 · inputs</div></div>
  <div class="u"><div class="box" style="border-radius:14px"></div><div class="tag">lg · 14 · cards</div></div>
  <div class="u"><div class="box" style="border-radius:20px"></div><div class="tag">xl · 20</div></div>
  <div class="u"><div class="box" style="border-radius:28px"></div><div class="tag">2xl · 28</div></div>
  <div class="u"><div class="box" style="border-radius:999px"></div><div class="tag">pill · 999</div></div>
</div>
</body></html>
