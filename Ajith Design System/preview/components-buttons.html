<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { background: var(--neutral-50); padding: 28px; display: flex; flex-wrap: wrap; gap: 12px; align-items: center; }
  .btn { font-family: var(--font-sans); font-weight: 600; font-size: 14px; padding: 10px 18px; border-radius: 10px; border: 1px solid transparent; cursor: pointer; transition: all 160ms cubic-bezier(0.25,1,0.5,1); display: inline-flex; align-items: center; gap: 8px; letter-spacing: -0.005em; }
  .btn-primary { background: var(--brand-violet-500); color: #fff; }
  .btn-primary:hover { background: var(--brand-violet-600); transform: translateY(-1px); box-shadow: 0 6px 18px -4px rgba(12,3,64,0.2); }
  .btn-ink { background: var(--neutral-900); color: var(--accent-cream); }
  .btn-outline { background: transparent; border-color: var(--neutral-900); color: var(--neutral-900); }
  .btn-outline:hover { background: var(--neutral-900); color: #fff; }
  .btn-ghost { background: transparent; color: var(--neutral-900); }
  .btn-ghost:hover { background: var(--neutral-100); }
  .btn-accent { background: var(--accent-citrus); color: var(--neutral-900); }
  .btn-accent:hover { box-shadow: 0 6px 18px -4px rgba(215,255,58,0.6); }
  .btn svg { width: 14px; height: 14px; }
</style>
</head><body class="card-shell">
<div class="card-eyebrow" style="width:100%"><span class="dot"></span>BUTTONS · PRIMARY &amp; VARIANTS</div>
<button class="btn btn-primary">Start a project <span>→</span></button>
<button class="btn btn-ink">Read more</button>
<button class="btn btn-outline">View all</button>
<button class="btn btn-ghost">Cancel</button>
<button class="btn btn-accent">✦ Highlight</button>
</body></html>
