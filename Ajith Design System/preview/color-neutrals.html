<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { background: var(--neutral-50); padding: 24px 28px; }
  .row { display: flex; gap: 0; border-radius: var(--r-lg); overflow: hidden; height: 92px; box-shadow: var(--shadow-sm); border: 1px solid var(--border); }
  .swatch { flex: 1; display: flex; flex-direction: column; justify-content: flex-end; padding: 10px 12px; font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.06em; line-height: 1.3; }
  .swatch .name { font-weight: 600; font-size: 11px; }
</style>
</head><body class="card-shell">
<div class="card-eyebrow"><span class="dot"></span>NEUTRALS · COOL DARK GREYS</div>
<div class="row">
  <div class="swatch" style="background:#FFFFFF;color:#0A0B0E"><div class="name">0</div>#FFFFFF</div>
  <div class="swatch" style="background:#F5F6F7;color:#0A0B0E"><div class="name">50 · bg</div>#F5F6F7</div>
  <div class="swatch" style="background:#E9EBEE;color:#0A0B0E"><div class="name">100</div>#E9EBEE</div>
  <div class="swatch" style="background:#D3D6DB;color:#0A0B0E"><div class="name">200 · border</div>#D3D6DB</div>
  <div class="swatch" style="background:#A9AEB6;color:#0A0B0E"><div class="name">300</div>#A9AEB6</div>
  <div class="swatch" style="background:#7B8088;color:#fff"><div class="name">400 · subtle</div>#7B8088</div>
  <div class="swatch" style="background:#555A63;color:#fff"><div class="name">500 · muted</div>#555A63</div>
  <div class="swatch" style="background:#3A3E46;color:#fff"><div class="name">600</div>#3A3E46</div>
  <div class="swatch" style="background:#24272D;color:#fff"><div class="name">700</div>#24272D</div>
  <div class="swatch" style="background:#0A0B0E;color:#fff"><div class="name">900 · fg</div>#0A0B0E</div>
</div>
</body></html>
