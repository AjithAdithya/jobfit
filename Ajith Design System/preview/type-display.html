<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { background: var(--neutral-50); padding: 22px 28px; display: flex; flex-direction: column; gap: 0; }
  .step { display: flex; align-items: baseline; gap: 14px; border-bottom: 1px dashed var(--border); padding: 8px 0; }
  .step:last-child { border: 0; }
  .tok { font-family: var(--font-mono); font-size: 10px; color: var(--fg-muted); width: 70px; flex: 0 0 70px; text-transform: uppercase; letter-spacing: 0.1em; }
  .spec { font-family: var(--font-sans); color: var(--fg); line-height: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
  .meta { font-family: var(--font-mono); font-size: 10px; color: var(--fg-subtle); flex: 0 0 auto; }
</style>
</head><body class="card-shell">
<div class="card-eyebrow"><span class="dot"></span>TYPE · DISPLAY SCALE</div>
<div class="step"><span class="tok">hero</span><span class="spec" style="font-family:var(--font-chunk);font-size:68px;letter-spacing:-0.02em">Quiet tools</span><span class="meta">chuner · 72+</span></div>
<div class="step"><span class="tok">fs-4xl</span><span class="spec" style="font-family:var(--font-edit);font-size:52px;letter-spacing:-0.01em;color:var(--brand-violet-500)">experiment</span><span class="meta">silkigfined · 52</span></div>
<div class="step"><span class="tok">fs-3xl</span><span class="spec" style="font-size:38px;font-weight:700;letter-spacing:-0.02em">Section title</span><span class="meta">sans · 38 · h2</span></div>
<div class="step"><span class="tok">fs-2xl</span><span class="spec" style="font-size:28px;font-weight:600">Subsection</span><span class="meta">sans · 28 · h3</span></div>
</body></html>
